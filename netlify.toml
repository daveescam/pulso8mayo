[build]
  command = "pnpm run build"
  publish = ".next"

[build.environment]
  # Node version
  NODE_VERSION = "22"
  # Skip secrets scanning for documentation files
  SECRETS_SCAN_OMIT_PATHS = ".opencode/**,.opencode/agents/**,.opencode/get-shit-done/**,.github/**"

# Headers for static assets
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
